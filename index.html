<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f0f4f8; }
        h1, h2, h3, .brand { font-family: 'Baloo 2', cursive; }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.2s ease; }
        .drop-zone.dragover { border-color: #6366f1; background-color: #eef2ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center">
            <h1 class="brand text-2xl text-indigo-900 m-0 tracking-wide">Mock Converter</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-2xl mx-auto w-full px-6 py-10">
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 mb-8">
            
            <!-- API Key Input -->
            <div class="mb-6">
                <label for="api_key" class="block text-sm font-bold text-gray-700 mb-2">OpenAI API Key <span class="text-red-500">*</span></label>
                <input type="password" id="api_key" placeholder="sk-..." class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow bg-gray-50">
                <p class="text-xs text-gray-500 mt-2">Your key is sent directly to the server for processing and is never stored.</p>
            </div>

            <!-- Drop Zone -->
            <div id="drop_zone" class="drop-zone rounded-2xl flex flex-col items-center justify-center py-16 px-4 cursor-pointer bg-gray-50 hover:bg-gray-100 mb-6">
                <svg class="w-16 h-16 text-indigo-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                <h3 class="text-xl font-semibold text-gray-800 mb-1 text-center">Drag and Drop Files or Click to Open</h3>
                <p class="text-sm text-gray-500 text-center">Supports PDF, PNG, and JPG</p>
                <input type="file" id="file_input" multiple accept=".pdf,.png,.jpg,.jpeg" class="hidden">
            </div>

            <!-- Options & Upload Button -->
            <div class="flex items-center justify-between mt-4">
                <label class="flex items-center cursor-pointer">
                    <div class="relative">
                        <input type="checkbox" id="include_images" class="sr-only">
                        <div class="block bg-gray-200 w-10 h-6 rounded-full transition-colors toggle-bg"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                    </div>
                    <span class="ml-3 text-sm font-medium text-gray-700">Include Images/Diagrams</span>
                </label>
                
                <button id="upload_btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-xl transition-colors shadow-sm">
                    Convert Mocks
                </button>
            </div>
        </div>

        <!-- Progress Container -->
        <div id="progress_container" class="space-y-4"></div>
    </main>

    <style>
        input:checked ~ .toggle-bg { background-color: #4f46e5; }
        input:checked ~ .dot { transform: translateX(100%); }
    </style>

    <script>
        const dropZone = document.getElementById('drop_zone');
        const fileInput = document.getElementById('file_input');
        const uploadBtn = document.getElementById('upload_btn');
        const progressContainer = document.getElementById('progress_container');
        let selectedFiles = [];

        // Drag and Drop Logic
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            dropZone.innerHTML = `<h3 class="text-xl font-semibold text-indigo-600 mb-1 text-center">${selectedFiles.length} file(s) ready</h3><p class="text-sm text-gray-500 text-center">Click upload to begin</p>`;
        }

        // Upload Logic
        uploadBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('api_key').value.trim();
            if (!apiKey) {
                alert("Please enter your OpenAI API key.");
                return;
            }
            if (selectedFiles.length === 0) {
                alert("Please select at least one file.");
                return;
            }

            const formData = new FormData();
            formData.append('api_key', apiKey);
            formData.append('include_images', document.getElementById('include_images').checked);
            selectedFiles.forEach(file => formData.append('files', file));

            try {
                uploadBtn.disabled = true;
                uploadBtn.textContent = "Uploading...";
                
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (response.ok) {
                    data.job_ids.forEach(jobId => createProgressCard(jobId));
                    selectedFiles = []; // Clear queue
                    dropZone.innerHTML = `<h3 class="text-xl font-semibold text-gray-800 mb-1 text-center">Drag and Drop Files or Click to Open</h3><p class="text-sm text-gray-500 text-center">Supports PDF, PNG, and JPG</p>`;
                } else {
                    alert(data.error || "Upload failed");
                }
            } catch (err) {
                alert("An error occurred during upload.");
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = "Convert Mocks";
            }
        });

        // Polling Logic
        function createProgressCard(jobId) {
            const cardId = `job_${jobId}`;
            const html = `
                <div id="${cardId}" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-semibold text-gray-700 truncate w-3/4" id="${cardId}_name">Preparing file...</span>
                        <span class="text-sm font-bold text-indigo-600" id="${cardId}_pct">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-2.5 mb-4">
                        <div id="${cardId}_bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <div id="${cardId}_status" class="text-sm text-gray-500">Starting OCR engine...</div>
                </div>`;
            progressContainer.insertAdjacentHTML('afterbegin', html);
            pollStatus(jobId, cardId);
        }

        async function pollStatus(jobId, cardId) {
            const interval = setInterval(async () => {
                const res = await fetch(`/status/${jobId}`);
                const data = await res.json();
                
                document.getElementById(`${cardId}_name`).textContent = data.filename;
                document.getElementById(`${cardId}_pct`).textContent = `${Math.round(data.progress)}%`;
                document.getElementById(`${cardId}_bar`).style.width = `${data.progress}%`;

                if (data.status === 'completed') {
                    clearInterval(interval);
                    document.getElementById(`${cardId}_status`).innerHTML = `<a href="/download/${data.result}" class="text-green-600 font-bold hover:underline inline-flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>Download Word Document</a>`;
                    document.getElementById(`${cardId}_bar`).classList.replace('bg-indigo-600', 'bg-green-500');
                    document.getElementById(`${cardId}_pct`).classList.replace('text-indigo-600', 'text-green-600');
                } else if (data.status === 'error') {
                    clearInterval(interval);
                    document.getElementById(`${cardId}_status`).innerHTML = `<span class="text-red-500">Error: ${data.error}</span>`;
                    document.getElementById(`${cardId}_bar`).classList.replace('bg-indigo-600', 'bg-red-500');
                }
            }, 2000);
        }
    </script>
</body>
</html>
